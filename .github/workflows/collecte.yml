name: Collecte des cours BRVM

on:
  schedule:
    - cron: '40 9,10,11,12,13,14 * * 1-5'
    - cron: '30 15 * * 1-5'
  workflow_dispatch:

concurrency:
  group: collecte-brvm
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer la collecte
        run: python scripts/collecte_cours.py

      - name: Importer l'historique existant
        if: github.event.schedule == '30 15 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: python scripts/importer_historique.py

      - name: Calculs techniques et exports
        if: github.event.schedule == '30 15 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: python scripts/calculs_techniques.py

      - name: Enregistrer les resultats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --cached --quiet && echo "Rien de nouveau" && exit 0
          git commit -m "Collecte $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
