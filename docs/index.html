<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BRVM Analyse Actions</title>
<style>
:root{--bleu:#2f5cf6;--vert:#16a34a;--rouge:#dc2626;--txt:#111827;--gris:#6b7280;
--fond:#ffffff;--ligne:#e5e7eb;--pastel:#f3f4f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--fond);
color:var(--txt);max-width:560px;margin:0 auto;padding:0 16px 60px}
header{position:sticky;top:0;background:var(--fond);padding:14px 0 8px;z-index:10;
border-bottom:1px solid var(--ligne)}
select{width:100%;font-size:17px;font-weight:700;border:1px solid var(--ligne);
border-radius:10px;padding:10px 12px;background:var(--fond);color:var(--txt)}
.chip{display:inline-block;background:var(--pastel);color:var(--gris);font-size:12px;
border-radius:6px;padding:2px 8px;margin-top:6px}
.prix{font-size:34px;font-weight:800;margin-top:14px}
.prix small{font-size:15px;font-weight:600;color:var(--gris)}
.varia{font-size:15px;font-weight:700;margin:2px 0 10px}
.varia .date{color:var(--gris);font-weight:500}
.hausse{color:var(--vert)}.baisse{color:var(--rouge)}.neutre{color:var(--gris)}
.periodes{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px}
.periodes button{border:none;background:var(--pastel);color:var(--txt);font-size:13px;
font-weight:600;border-radius:8px;padding:6px 11px;cursor:pointer}
.periodes button.actif{background:var(--fond);border:1px solid var(--ligne);
box-shadow:0 1px 3px rgba(0,0,0,.08);color:var(--bleu)}
.periodes button:disabled{color:#c3c7cf;cursor:not-allowed}
#zoneGraph{height:230px;position:relative}
#msgGraph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
color:var(--gris);font-size:13px;display:none}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px;border-top:1px solid var(--ligne);
border-bottom:1px solid var(--ligne);padding:10px 0;margin:14px 0;font-size:13.5px}
.stats div{display:flex;justify-content:space-between;padding:3px 0}
.stats .lib{color:var(--gris)}
.onglets{display:flex;border-bottom:2px solid var(--ligne);margin:6px 0 16px}
.onglets button{flex:1;border:none;background:none;font-size:15px;font-weight:600;
color:var(--gris);padding:11px 0;cursor:pointer;border-bottom:2.5px solid transparent;
margin-bottom:-2px}
.onglets button.actif{color:var(--txt);border-color:var(--bleu)}
h2{font-size:17px;margin:22px 0 10px}
.desc{font-size:14.5px;line-height:1.55;color:#374151}
.lirePlus{color:var(--bleu);font-size:14px;cursor:pointer;font-weight:600}
.liste div{display:flex;justify-content:space-between;padding:9px 0;
border-bottom:1px solid var(--pastel);font-size:14.5px}
.liste .lib{color:#374151}
.liste .val{font-weight:600}
.indispo{color:#c3c7cf}
#graphDiv{height:180px;position:relative;margin-top:10px}
.notebas{color:var(--gris);font-size:12px;margin-top:10px}
.masque{display:none}
</style>
</head>
<body>
<header>
  <select id="choixValeur"></select>
  <span class="chip" id="chipSecteur"></span>
</header>

<div class="prix"><span id="cours">…</span> <small>FCFA</small></div>
<div class="varia"><span id="variation"></span> <span class="date" id="dateCours"></span></div>

<div class="periodes" id="periodes">
  <button data-p="1J">1J</button><button data-p="1S">1S</button>
  <button data-p="1M" class="actif">1M</button><button data-p="3M">3M</button>
  <button data-p="6M">6M</button><button data-p="YTD">YTD</button>
  <button data-p="1A">1A</button><button data-p="Max">Max</button>
</div>
<div id="zoneGraph"><canvas id="graphique"></canvas><div id="msgGraph"></div></div>

<div class="stats" id="stats"></div>

<div class="onglets">
  <button class="actif">Aperçu</button>
  <button disabled title="Phase 4">Analyse</button>
  <button disabled title="Phase 5">Carnet d'ordres</button>
</div>

<h2>Description</h2>
<p class="desc"><span id="descTexte">—</span> <span class="lirePlus masque" id="lirePlus">Lire plus</span></p>

<h2>Indicateurs clés</h2>
<div class="liste" id="indicateurs"></div>

<h2>Dividendes</h2>
<div class="liste" id="blocDividendes"></div>
<div id="graphDiv"><canvas id="graphDividendes"></canvas></div>
<p class="notebas" id="noteSources"></p>

<script>
const fmt = n => n==null ? "—" : new Intl.NumberFormat('fr-FR',{maximumFractionDigits:2}).format(n);
const fmtEntier = n => n==null ? "—" : new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(n);
const fmtMds = m => m==null ? "—" : (m>=1e6 ? fmt(m/1e6)+" Bds" : fmt(m/1e3)+" Mds");
let cours={}, tech={}, fonda={}, histo=null, graph=null, graphDiv=null, periode="1M";

// Chargement de Chart.js avec source de secours
function chargerChartJs(){
  return new Promise(res=>{
    if(window.Chart) return res(true);
    const urls=[
      "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js",
      "https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"];
    let i=0;
    const essai=()=>{ if(i>=urls.length) return res(false);
      const s=document.createElement('script'); s.src=urls[i++];
      s.onload=()=>res(true); s.onerror=essai; document.head.appendChild(s); };
    essai();
  });
}

async function chargerBase(){
  const chartOk = await chargerChartJs();
  if(!chartOk) document.getElementById('msgGraph').textContent =
    "Graphique indisponible (bibliothèque non chargée)";
  const [c,t,f] = await Promise.all([
    fetch('data/cours.json').then(r=>r.json()),
    fetch('data/technique.json').then(r=>r.json()).catch(()=>({valeurs:{}})),
    fetch('data/fondamentaux.json').then(r=>r.json()).catch(()=>({valeurs:{}})),
  ]);
  cours=c; tech=t.valeurs||{}; fonda=f.valeurs||{};
  const sel=document.getElementById('choixValeur');
  c.valeurs.sort((a,b)=>a.nom.localeCompare(b.nom)).forEach(v=>{
    const o=document.createElement('option');
    o.value=v.ticker; o.textContent=v.nom+" ("+v.ticker+")";
    sel.appendChild(o);
  });
  sel.onchange=()=>afficher(sel.value);
  afficher(sel.value);
}

async function afficher(t){
  histo = await fetch('data/historique/'+t+'.json').then(r=>r.json()).catch(()=>null);
  const v = cours.valeurs.find(x=>x.ticker===t)||{};
  const te = tech[t]||{}, fo = fonda[t]||{};

  document.getElementById('chipSecteur').textContent = t;
  document.getElementById('cours').textContent = fmtEntier(v.cours);
  const va = v.variation_pct;
  const el = document.getElementById('variation');
  // Delta en FCFA deduit du % officiel (colonne veille BRVM non fiable)
  const delta = (v.cours!=null && va!=null) ? v.cours - v.cours/(1+va/100) : null;
  el.className = va>0?'hausse':va<0?'baisse':'neutre';
  el.textContent = (delta!=null?((delta>=0?'+':'')+fmtEntier(delta)+' FCFA  '):'') +
                   (va!=null?((va>=0?'↗ +':'↘ ')+fmt(va)+' %'):'');
  const d = cours.maj ? new Date(cours.maj) : null;
  document.getElementById('dateCours').textContent = d ? '· ' +
    d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}) : '';

  const pts = (histo&&histo.seance&&histo.seance.points)||[];
  const cSeance = pts.map(p=>p.cours);
  const haut = cSeance.length?Math.max(...cSeance):null;
  const bas  = cSeance.length?Math.min(...cSeance):null;
  const dernierEx = derniersFondamentaux(fo);
  const stats = [
    ["Ouverture", fmtEntier(v.ouverture)], ["Vol.", fmtEntier(v.volume)],
    ["52s H", fmtEntier(te.haut_52s)],
    ["Haut", fmtEntier(haut)], ["Cap.", fmtMds(fo.capitalisation_mfcfa)],
    ["52s B", fmtEntier(te.bas_52s)],
    ["Bas", fmtEntier(bas)], ["PER", dernierEx.per!=null?fmt(dernierEx.per)+"x":"—"],
    ["Vol. moy(20)", fmtEntier(te.volume_moyen_20)],
  ];
  document.getElementById('stats').innerHTML =
    stats.map(s=>`<div><span class="lib">${s[0]}</span><span>${s[1]}</span></div>`).join('');

  const dt=document.getElementById('descTexte'), lp=document.getElementById('lirePlus');
  const desc = fo.description||null;
  if(desc){
    const court = desc.length>220 ? desc.slice(0,220)+"…" : desc;
    dt.textContent = court;
    if(desc.length>220){ lp.classList.remove('masque');
      lp.onclick=()=>{dt.textContent=desc; lp.classList.add('masque');}; }
    else lp.classList.add('masque');
  } else { dt.textContent="—"; lp.classList.add('masque'); }

  const vc = (dernierEx.capitaux_propres!=null && fo.nombre_titres) ?
             dernierEx.capitaux_propres*1e6/fo.nombre_titres : null;
  const lignes = [
    ["PER", dernierEx.per!=null?fmt(dernierEx.per)+"x":null],
    ["BPA", dernierEx.bnpa!=null?fmt(dernierEx.bnpa)+" FCFA":null],
    ["Capitalisation", fo.capitalisation_mfcfa!=null?fmtMds(fo.capitalisation_mfcfa):null],
    ["Nombre d'actions", fo.nombre_titres!=null?fmtEntier(fo.nombre_titres):null],
    ["RSI (14)", te.rsi14!=null?fmt(te.rsi14):null],
    ["Price-to-Book (PBR)", dernierEx.pbr!=null?fmt(dernierEx.pbr)+"x":null],
    ["Valeur comptable / action", vc!=null?fmtEntier(vc)+" FCFA":null],
    ["ROE"+(dernierEx.exercice_roe?" ("+dernierEx.exercice_roe+")":""),
      dernierEx.roe_pct!=null?fmt(dernierEx.roe_pct)+" %":null],
    ["Dette / Capitaux propres", dernierEx.dette_sur_cp!=null?fmt(dernierEx.dette_sur_cp):null],
    ["Moy. mobile (20)", te.mm20!=null?fmtEntier(te.mm20):null],
    ["Moy. mobile (50)", te.mm50!=null?fmtEntier(te.mm50):null],
    ["Moy. mobile (200)", te.mm200!=null?fmtEntier(te.mm200):null],
  ];
  document.getElementById('indicateurs').innerHTML = lignes.map(l=>
    `<div><span class="lib">${l[0]}</span><span class="val ${l[1]==null?'indispo':''}">${l[1]??'—'}</span></div>`
  ).join('');

  const divs = (histo&&histo.dividendes)||[];
  const dernier = divs.length?divs[divs.length-1]:null;
  const bloc = [
    ["Exercice fiscal", dernier?dernier.exercice:null],
    ["Dividende / action (brut)", dernier?fmt(dernier.montant)+" FCFA":null],
    ["Dividende net / action (IRVM 10 %)", dernier?fmt(dernier.montant*0.9)+" FCFA":null],
  ];
  document.getElementById('blocDividendes').innerHTML = bloc.map(l=>
    `<div><span class="lib">${l[0]}</span><span class="val ${l[1]==null?'indispo':''}">${l[1]??'—'}</span></div>`
  ).join('');

  document.getElementById('noteSources').textContent =
    "Sources : BRVM (cours), Sika Finance et rapports annuels (fondamentaux). " +
    "Dernière mise à jour : " + (cours.maj||"—").replace("T"," ").slice(0,16) + " UTC.";

  // Graphique principal d'abord, dividendes ensuite, chacun protege
  majPeriodes();
  try{ dessinerGraphique(); }catch(e){ console.error("Graphique cours:",e);
    document.getElementById('msgGraph').style.display='flex';
    document.getElementById('msgGraph').textContent="Graphique indisponible"; }
  try{ dessinerDividendes(divs); }catch(e){ console.error("Graphique dividendes:",e); }
}

function derniersFondamentaux(fo){
  const res={};
  const exs = Object.keys(fo.exercices||{}).sort();
  for(const champ of ["per","bnpa","pbr","roe_pct","dette_sur_cp","capitaux_propres"]){
    for(let i=exs.length-1;i>=0;i--){
      const l=fo.exercices[exs[i]];
      if(l && l[champ] && l[champ].valeur!=null){
        res[champ]=l[champ].valeur;
        if(champ==="roe_pct") res.exercice_roe=exs[i];
        break;
      }
    }
  }
  return res;
}

function seriePourPeriode(){
  if(!histo) return {labels:[],data:[],ref:null};
  const q=histo.quotidien||[], m=histo.mensuel||[];
  const combine=[...m.map(x=>({d:x.date,c:x.cours})),
                 ...q.filter(x=>!m.length||x.date>m[m.length-1].date).map(x=>({d:x.date,c:x.cours}))];
  const dern = combine.length?combine[combine.length-1].d:null;
  const coupe = js => combine.filter(x=>x.d>=js);
  const an=dern?+dern.slice(0,4):0;
  function serie(s){return {labels:s.map(x=>x.d),data:s.map(x=>x.c),ref:null};}
  function rec(d,ans,mois){
    let a=+d.slice(0,4), mo=+d.slice(5,7)-mois; a-=ans;
    while(mo<1){mo+=12;a--;}
    return a+"-"+String(mo).padStart(2,"0")+d.slice(7,10);
  }
  if(!dern) return {labels:[],data:[],ref:null};
  switch(periode){
    case "1J": {
      const pts=(histo.seance&&histo.seance.points)||[];
      return {labels:pts.map(p=>p.h), data:pts.map(p=>p.cours),
              ref:histo.seance?histo.seance.veille:null};
    }
    case "1S": { const s=q.slice(-5); return {labels:s.map(x=>x.date.slice(5)),data:s.map(x=>x.cours),ref:null}; }
    case "1M": return serie(coupe(rec(dern,0,1)));
    case "3M": return serie(coupe(rec(dern,0,3)));
    case "6M": return serie(coupe(rec(dern,0,6)));
    case "YTD": return serie(coupe(an+"-01-01"));
    case "1A": return serie(coupe(rec(dern,1,0)));
    default:   return serie(combine);
  }
}

function majPeriodes(){
  const pts=(histo&&histo.seance&&histo.seance.points)||[];
  const q=(histo&&histo.quotidien)||[];
  document.querySelectorAll('#periodes button').forEach(b=>{
    const p=b.dataset.p;
    b.disabled = (p==="1J"&&pts.length<2) || (p==="1S"&&q.length<2);
    b.classList.toggle('actif',p===periode);
  });
  if(document.querySelector('#periodes button.actif')?.disabled){ periode="1M"; majPeriodes(); }
}

function dessinerGraphique(){
  if(!window.Chart) return;
  const s=seriePourPeriode();
  document.getElementById('msgGraph').style.display = s.data.length?'none':'flex';
  if(!s.data.length){ document.getElementById('msgGraph').textContent="Pas encore de données pour cette période"; }
  const monte = s.data.length>1 ? s.data[s.data.length-1]>=s.data[0] : true;
  const coul = monte?'#16a34a':'#dc2626';
  if(graph) graph.destroy();
  graph = new Chart(document.getElementById('graphique'),{
    type:'line',
    data:{labels:s.labels,datasets:[{data:s.data,borderColor:coul,borderWidth:2,
      pointRadius:0,fill:true,tension:0,stepped:periode==="1J",
      backgroundColor:c=>{const g=c.chart.ctx.createLinearGradient(0,0,0,230);
        g.addColorStop(0,coul+"33");g.addColorStop(1,coul+"00");return g;}}]},
    options:{maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{intersect:false,mode:'index'}},
      scales:{x:{ticks:{maxTicksLimit:5,color:'#9ca3af',font:{size:11}},grid:{display:false}},
              y:{position:'right',ticks:{maxTicksLimit:5,color:'#9ca3af',font:{size:11},
                 callback:v=>fmtEntier(v)},grid:{color:'#f3f4f6'}}}}
  });
}

function dessinerDividendes(divs){
  if(!window.Chart) return;
  if(graphDiv) graphDiv.destroy();
  if(!divs.length){document.getElementById('graphDiv').style.display='none';return;}
  document.getElementById('graphDiv').style.display='block';
  graphDiv = new Chart(document.getElementById('graphDividendes'),{
    type:'bar',
    data:{labels:divs.map(d=>d.exercice),
      datasets:[{data:divs.map(d=>d.montant),backgroundColor:'#2f5cf6',borderRadius:4}]},
    options:{maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:11}}},
              y:{ticks:{maxTicksLimit:4,color:'#9ca3af',font:{size:11}},grid:{color:'#f3f4f6'}}}}
  });
}

document.getElementById('periodes').addEventListener('click',e=>{
  if(e.target.dataset.p && !e.target.disabled){ periode=e.target.dataset.p; majPeriodes(); dessinerGraphique(); }
});
chargerBase();
</script>
</body>
</html>
