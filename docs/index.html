<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BRVM Analyse Actions</title>
<style>
:root{
  /* Palette affinee - tons plus riches, typiques d'un tableau de bord financier,
     tout en restant proches des teintes Famaya deja validees */
  --bleu:#2952e3;--bleu-clair:#eef1fd;
  --vert:#0e9f6e;--vert-clair:#e7f7f1;
  --rouge:#d92d20;--rouge-clair:#fdeeed;
  --ambre:#d97706;--ambre-clair:#fef3c7;
  --txt:#101828;--txt-secondaire:#475467;--gris:#667085;--gris-clair:#98a2b3;
  --vert-doux:#3cc98a;--ambre-texte:#92400e;
  --fond:#ffffff;--ligne:#e4e7ec;--pastel:#f7f8fa;--carte:#ffffff;
  /* Alias semantiques (utilises pour les ajouts au-dela de la fiche Famaya) */
  --positif:var(--vert);--negatif:var(--rouge);--attention:var(--ambre)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--fond);
color:var(--txt);max-width:560px;margin:0 auto;padding:0 16px 60px;
font-variant-numeric:tabular-nums;line-height:1.5}
h2{color:var(--txt)}
.desc,.regle,.notebas{text-align:justify;text-justify:inter-word;hyphens:auto}
.carte{background:var(--carte);border:1px solid var(--ligne);border-radius:14px;
  padding:16px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.carte h2{margin-top:0}
.pos{color:var(--positif)}.neg{color:var(--negatif)}.neutre-txt{color:var(--gris)}
table tbody tr:nth-child(even) td{background:var(--pastel)}
header{position:sticky;top:0;background:var(--fond);padding:14px 0 8px;z-index:10;
border-bottom:1px solid var(--ligne)}
select{width:100%;font-size:17px;font-weight:700;border:1px solid var(--ligne);
border-radius:10px;padding:10px 12px;background:var(--fond);color:var(--txt)}
.chip{display:inline-block;background:var(--pastel);color:var(--gris);font-size:12px;
border-radius:6px;padding:2px 8px;margin-top:6px}
.prix{font-size:34px;font-weight:800;margin-top:14px}
.prix small{font-size:15px;font-weight:600;color:var(--gris)}
.varia{font-size:15px;font-weight:700;margin:2px 0 10px}
.varia .date{color:var(--gris);font-weight:500}
.hausse{color:var(--vert)}.baisse{color:var(--rouge)}.neutre{color:var(--gris)}
.periodes{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px}
.periodes button{border:none;background:var(--pastel);color:var(--txt);font-size:13px;
font-weight:600;border-radius:8px;padding:6px 11px;cursor:pointer}
.periodes button.actif{background:var(--fond);border:1px solid var(--ligne);
box-shadow:0 1px 3px rgba(0,0,0,.08);color:var(--bleu)}
.periodes button:disabled{color:var(--gris-clair);cursor:not-allowed}
#zoneGraph{height:230px;position:relative}
#msgGraph{position:absolute;inset:0;align-items:center;justify-content:center;
color:var(--gris);font-size:13px;display:none}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px;border-top:1px solid var(--ligne);
border-bottom:1px solid var(--ligne);padding:10px 0;margin:14px 0;font-size:13.5px}
.stats div{display:flex;justify-content:space-between;padding:3px 0}
.stats .lib{color:var(--gris)}
.onglets{display:flex;border-bottom:2px solid var(--ligne);margin:6px 0 16px}
.onglets button{flex:1;border:none;background:none;font-size:15px;font-weight:600;
color:var(--gris);padding:11px 0;cursor:pointer;border-bottom:2.5px solid transparent;
margin-bottom:-2px}
.onglets button.actif{color:var(--txt);border-color:var(--bleu)}
h2{font-size:17px;margin:22px 0 10px}
.desc{font-size:14.5px;line-height:1.55;color:var(--txt-secondaire)}
.lirePlus{color:var(--bleu);font-size:14px;cursor:pointer;font-weight:600}
.liste div{display:flex;justify-content:space-between;padding:9px 0;
border-bottom:1px solid var(--pastel);font-size:14.5px}
.liste .lib{color:var(--txt-secondaire)}
.liste .val{font-weight:600}
.indispo{color:var(--gris-clair)}
#graphDiv{height:180px;position:relative;margin-top:10px}
.notebas{color:var(--gris);font-size:12px;margin-top:10px}
.onglets button{font-size:13.5px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--gris);font-weight:600;text-align:right;padding:7px 3px;border-bottom:1px solid var(--ligne)}
th:first-child,td:first-child{text-align:left}
td{padding:8px 3px;border-bottom:1px solid var(--pastel);text-align:right}
td .tick{color:var(--bleu);font-weight:700;cursor:pointer}
.badge{font-size:11px;font-weight:700;border-radius:6px;padding:2px 6px}
.bA{background:var(--vert-clair);color:#046c4e}.bC{background:var(--ambre-clair);color:var(--ambre-texte)}
.bV{background:var(--rouge-clair);color:#912018}
.regle{color:var(--gris);font-size:12.5px;margin-bottom:8px}
.vide{color:var(--gris);font-size:13.5px;padding:10px 0}
.masque{display:none}

/* --- Revue ergonomie/qualite visuelle : etats d'interaction, accessibilite --- */
:root{--focus:var(--bleu);--survol:#f8fafc;--transition:150ms ease}

/* Focus clavier visible partout (aucune regle n'existait avant) */
a:focus-visible, button:focus-visible, select:focus-visible, span[tabindex]:focus-visible{
  outline:2px solid var(--focus);outline-offset:2px;border-radius:4px}

/* Etats de survol - boutons de periode */
.periodes button:not(:disabled):hover{background:var(--bleu-clair);color:var(--bleu)}
.periodes button{transition:background var(--transition),color var(--transition)}

/* Etats de survol - onglets */
.onglets button:not(.actif):hover{color:var(--txt)}
.onglets button{transition:color var(--transition),border-color var(--transition)}

/* Etats de survol - lignes de tableau et de liste (meilleur balayage visuel) */
table tr:hover td{background:var(--survol)}
table tr{transition:background var(--transition)}
.liste div{transition:background var(--transition)}
.liste div:hover{background:var(--survol);border-radius:6px}

/* Tickers cliquables (onglet Filtres) : affordance de lien plus claire */
td .tick{transition:color var(--transition)}
td .tick:hover{text-decoration:underline}

/* Etat de chargement visible (le sel.disabled existait deja, le rendu non) */
select:disabled{opacity:.6;cursor:progress}
body.chargement #contenuApercu,body.chargement #contenuAnalyse,
body.chargement #contenuCarnet,body.chargement #contenuFiltres{opacity:.45;
  transition:opacity var(--transition)}

/* Transition douce a l'affichage d'un onglet (contenu deja charge, juste reaffiche) */
.masque{display:none}
.contenu-onglet{animation:apparition 180ms ease}
@keyframes apparition{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:none}}

/* Score chiffre sous le libellé qualitatif de chaque jauge (nouveau, valide) */
.score-jauge{display:block;text-align:center;font-size:12px;color:var(--gris);
  font-variant-numeric:tabular-nums;margin-top:-4px;margin-bottom:6px}

/* Respect du confort visuel : neutralise toutes les transitions/animations */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{transition:none !important;animation:none !important}
}

/* --- Lien d'evitement (accessibilite clavier) --- */
.lien-evitement{position:absolute;left:-9999px;top:0;background:var(--bleu);color:#fff;
  padding:10px 16px;border-radius:0 0 8px 0;z-index:100;font-size:14px;font-weight:600}
.lien-evitement:focus{left:0}

/* --- Barre d'outils (theme, export) --- */
.entete-outils{display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px}
.btn-icone{border:1px solid var(--ligne);background:var(--fond);border-radius:8px;
  width:34px;height:34px;font-size:16px;cursor:pointer;line-height:1}
.btn-icone:hover{background:var(--survol)}
.btn-icone.actif{border-color:var(--bleu);color:var(--bleu)}

/* --- Recherche + favori --- */
.recherche-valeur{display:flex;gap:6px;margin-bottom:6px}
.recherche-valeur input{flex:1;font-size:14px;border:1px solid var(--ligne);
  border-radius:10px;padding:8px 10px;background:var(--fond);color:var(--txt)}

/* --- Alerte de prix --- */
.bloc-alerte{margin:8px 0;font-size:13px}
.bloc-alerte .ligne-config{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.bloc-alerte input[type=number]{width:90px;border:1px solid var(--ligne);border-radius:8px;
  padding:6px 8px;font-size:13px}
.bloc-alerte select{width:auto;font-size:13px;font-weight:500;padding:6px 8px}
.bloc-alerte button{border:1px solid var(--bleu);background:var(--fond);color:var(--bleu);
  border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer}
.bandeau-alerte{background:#fef3c7;color:#92400e;border-radius:8px;padding:8px 10px;
  margin-top:6px;font-weight:600;font-size:13px}
.note-limite{color:var(--gris);font-size:11.5px;margin-top:4px}

/* --- Tableaux triables (Filtres) --- */
th.triable{cursor:pointer;user-select:none}
th.triable:hover{color:var(--bleu)}
th.triable .fleche{font-size:10px;margin-left:2px;opacity:.6}
.barre-outils-table{display:flex;justify-content:flex-end;margin:4px 0 10px}
.bouton-csv{border:1px solid var(--ligne);background:var(--fond);color:var(--txt);
  border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer}
.bouton-csv:hover{background:var(--survol)}

/* --- Sparkline --- */
.spark{vertical-align:middle;margin-left:4px}

/* --- Comparateur --- */
.comparateur select{height:110px}
.comparateur table{margin-top:10px}

/* --- Semantique liste (dl/dt/dd et ul/li) sans casser le rendu visuel --- */
dl.liste{margin:0}
dl.liste > div{display:flex;justify-content:space-between;padding:9px 0;
  border-bottom:1px solid var(--pastel);font-size:14.5px}
dl.liste dt{color:var(--txt-secondaire);font-weight:400}
dl.liste dd{font-weight:600;margin:0}
ul.liste-pastilles{list-style:none}

/* --- Mode sombre : override manuel (prioritaire sur la preference systeme) --- */
html[data-theme="sombre"]{--fond:#0f172a;--txt:#e5e7eb;--gris:#9ca3af;
  --ligne:#243044;--pastel:#1a2436;--survol:#16213a}
@media (prefers-color-scheme: dark){
  html:not([data-theme="clair"]){--fond:#0f172a;--txt:#e5e7eb;--gris:#9ca3af;
    --ligne:#243044;--pastel:#1a2436;--survol:#16213a}
}

/* --- Impression / export PDF : ne garder que le contenu utile --- */
@media print{
  .lien-evitement,.entete-outils,.recherche-valeur,#btnFavori,.periodes,.onglets,
  .bandeau-alerte,.bloc-alerte,.bouton-csv,.barre-outils-table{display:none !important}
  body{max-width:100%}
}
</style>
</head>
<body>
<a href="#contenuPrincipal" class="lien-evitement">Aller au contenu</a>
<header>
  <div class="entete-outils">
    <button id="btnTheme" class="btn-icone" type="button" title="Changer de thème"
      aria-label="Basculer entre thème clair et sombre">🌙</button>
    <button id="btnExport" class="btn-icone" type="button" title="Exporter en PDF"
      aria-label="Exporter cette fiche en PDF">🖶</button>
  </div>
  <div class="recherche-valeur">
    <input type="search" id="rechercheValeur" placeholder="Rechercher une valeur ou un ticker…"
      aria-label="Rechercher une valeur">
    <button id="btnFavori" class="btn-icone" type="button" title="Ajouter aux favoris"
      aria-label="Ajouter ou retirer des favoris" aria-pressed="false">☆</button>
  </div>
  <select id="choixValeur" aria-label="Choisir une valeur"></select>
  <span class="chip" id="chipSecteur"></span>
</header>

<main id="contenuPrincipal">
<div class="prix"><span id="cours">…</span> <small>FCFA</small></div>
<div class="varia"><span id="variation"></span> <span class="date" id="dateCours"></span></div>
<div id="blocAlerte" class="bloc-alerte"></div>

<div class="periodes" id="periodes">
  <button data-p="1J">1J</button><button data-p="1S">1S</button>
  <button data-p="1M" class="actif">1M</button><button data-p="3M">3M</button>
  <button data-p="6M">6M</button><button data-p="YTD">YTD</button>
  <button data-p="1A">1A</button><button data-p="Max">Max</button>
</div>
<div id="zoneGraph"><canvas id="graphique"></canvas><div id="msgGraph"></div></div>

<div class="stats" id="stats"></div>

<div class="onglets" id="onglets">
  <button class="actif" data-o="apercu">Aperçu</button>
  <button data-o="analyse">Analyse</button>
  <button data-o="carnet">Carnet d'ordres</button>
  <button data-o="filtres">Filtres</button>
</div>

<div id="contenuApercu" class="contenu-onglet">
<h2>Description</h2>
<p class="desc"><span id="descTexte">—</span> <span class="lirePlus masque" id="lirePlus">Lire plus</span></p>

<h2>Indicateurs clés</h2>
<div class="liste" id="indicateurs"></div>

<h2>Dividendes</h2>
<div class="liste" id="blocDividendes"></div>
<div id="graphDiv"><canvas id="graphDividendes"></canvas></div>
<p class="notebas" id="noteSources"></p>
</div>
<div id="contenuAnalyse" class="masque contenu-onglet"></div>
<div id="contenuCarnet" class="masque contenu-onglet"></div>
<div id="contenuFiltres" class="masque contenu-onglet"></div>
</main>

<script>
const fmt = n => n==null ? "—" : new Intl.NumberFormat('fr-FR',{maximumFractionDigits:2}).format(n);
const fmtEntier = n => n==null ? "—" : new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(n);
const fmtMds = m => m==null ? "—" : (m>=1e6 ? fmt(m/1e6)+" Bds" : fmt(m/1e3)+" Mds");
const fmtK = n => n==null ? "—" : (n>=1e6 ? fmt(n/1e6)+" M" :
  n>=1000 ? new Intl.NumberFormat('fr-FR',{maximumFractionDigits:1}).format(n/1000)+" K" : fmtEntier(n));
const LIB_SECTEURS = {FIN:"Finances", CB:"Consommation de base", CD:"Consommation discrétionnaire",
  IND:"Industriels", ENE:"Énergie", TEL:"Télécommunications", SPU:"Services publics"};
const LIB_PERIODE = {"1S":"1 semaine","1M":"1 mois","3M":"3 mois","6M":"6 mois",
  "YTD":"depuis le 1er janv.","1A":"1 an","Max":"Max"};
const cacheHisto=new Map();
let jetonAffichage=0;
let cours={}, tech={}, fonda={}, secteurs={}, histo=null, valCourante=null,
    graph=null, graphDiv=null, periode="1M";
let optionsToutes=[], historiqueRecos={};

// --- Favoris (localStorage, aucun serveur) ---
function chargerFavoris(){
  try{ return JSON.parse(localStorage.getItem('brvm_favoris')||'[]'); }catch(e){ return []; }
}
function sauverFavoris(liste){
  try{ localStorage.setItem('brvm_favoris', JSON.stringify(liste)); }catch(e){}
}
function estFavori(t){ return chargerFavoris().includes(t); }

// --- Theme clair/sombre (bascule manuelle, sinon suit le systeme) ---
function appliquerTheme(){
  const t = localStorage.getItem('brvm_theme');
  if(t==='clair'||t==='sombre') document.documentElement.setAttribute('data-theme', t);
  else document.documentElement.removeAttribute('data-theme');
  const btn=document.getElementById('btnTheme');
  if(btn) btn.textContent = (document.documentElement.getAttribute('data-theme')==='sombre'||
    (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) ? '☀' : '🌙';
}
function basculerTheme(){
  const actuel = document.documentElement.getAttribute('data-theme') ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'sombre' : 'clair');
  const suivant = actuel==='sombre' ? 'clair' : 'sombre';
  localStorage.setItem('brvm_theme', suivant);
  appliquerTheme();
  try{ dessinerGraphique(); dessinerDividendes((histo&&histo.dividendes)||[]); }catch(e){}
}
// Couleur lue depuis la variable CSS active (s'adapte automatiquement au theme)
function couleurCss(nom){
  return getComputedStyle(document.documentElement).getPropertyValue(nom).trim() || '#9ca3af';
}

function chargerChartJs(){
  return new Promise(res=>{
    if(window.Chart) return res(true);
    const urls=[
      "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js",
      "https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"];
    let i=0;
    const essai=()=>{ if(i>=urls.length) return res(false);
      const s=document.createElement('script'); s.src=urls[i++];
      s.onload=()=>res(true); s.onerror=essai; document.head.appendChild(s); };
    essai();
  });
}

function repeupler(filtreTexte){
  const sel=document.getElementById('choixValeur');
  const valeurActuelle = sel.value;
  const favoris = chargerFavoris();
  const texte = (filtreTexte||'').trim().toLowerCase();
  const correspond = v => !texte || v.nom.toLowerCase().includes(texte) ||
    v.ticker.toLowerCase().includes(texte);
  const filtrees = optionsToutes.filter(correspond);
  const favs = filtrees.filter(v=>favoris.includes(v.ticker));
  const autres = filtrees.filter(v=>!favoris.includes(v.ticker));
  sel.innerHTML='';
  if(favs.length){
    const grp=document.createElement('optgroup'); grp.label='★ Favoris';
    favs.forEach(v=>grp.appendChild(creerOption(v))); sel.appendChild(grp);
  }
  if(autres.length){
    const grp=document.createElement('optgroup'); grp.label=favs.length?'Toutes les valeurs':'';
    autres.forEach(v=>grp.appendChild(creerOption(v))); sel.appendChild(grp);
  }
  if(!filtrees.length){
    const o=document.createElement('option'); o.textContent='Aucune valeur trouvée'; o.disabled=true;
    sel.appendChild(o);
  } else if(filtrees.some(v=>v.ticker===valeurActuelle)){
    sel.value = valeurActuelle;
  }
}
function creerOption(v){
  const o=document.createElement('option');
  o.value=v.ticker; o.textContent=v.nom+" ("+v.ticker+")";
  return o;
}

function majFavoriUI(t){
  const btn=document.getElementById('btnFavori');
  const actif = estFavori(t);
  btn.textContent = actif ? '★' : '☆';
  btn.classList.toggle('actif', actif);
  btn.setAttribute('aria-pressed', String(actif));
}

async function chargerBase(){
  appliquerTheme();
  if(window.matchMedia){
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{
      if(!localStorage.getItem('brvm_theme')) appliquerTheme();
    });
  }
  const chartOk = await chargerChartJs();
  if(!chartOk){ const m=document.getElementById('msgGraph');
    m.style.display='flex'; m.textContent="Graphique indisponible (bibliothèque non chargée)"; }
  const [c,t,f,s,hr] = await Promise.all([
    fetch('data/cours.json').then(r=>r.json()),
    fetch('data/technique.json').then(r=>r.json()).catch(()=>({valeurs:{}})),
    fetch('data/fondamentaux.json').then(r=>r.json()).catch(()=>({valeurs:{}})),
    fetch('data/secteurs.json').then(r=>r.json()).catch(()=>({})),
    fetch('data/historique_recos.json').then(r=>r.json()).catch(()=>({valeurs:{}})),
  ]);
  cours=c; tech=t.valeurs||{}; fonda=f.valeurs||{}; secteurs=s||{};
  historiqueRecos = hr.valeurs||{};
  optionsToutes = c.valeurs.slice().sort((a,b)=>a.nom.localeCompare(b.nom))
    .map(v=>({ticker:v.ticker, nom:v.nom}));

  const sel=document.getElementById('choixValeur');
  repeupler('');
  sel.onchange=()=>{ afficher(sel.value); };

  document.getElementById('rechercheValeur').addEventListener('input', e=>{
    repeupler(e.target.value);
  });
  document.getElementById('btnFavori').addEventListener('click', ()=>{
    const t = sel.value; if(!t) return;
    let favs = chargerFavoris();
    favs = favs.includes(t) ? favs.filter(x=>x!==t) : [...favs, t];
    sauverFavoris(favs);
    majFavoriUI(t);
    repeupler(document.getElementById('rechercheValeur').value);
    sel.value = t;
  });
  document.getElementById('btnTheme').addEventListener('click', basculerTheme);
  document.getElementById('btnExport').addEventListener('click', ()=>window.print());

  // Valeur de depart : lien direct (?valeur=TICK) > derniere consultee > premiere alphabetique
  const params = new URLSearchParams(location.search);
  const depuisUrl = (params.get('valeur')||'').toUpperCase();
  const derniere = localStorage.getItem('brvm_derniere');
  let depart = optionsToutes[0] ? optionsToutes[0].ticker : null;
  if(depuisUrl && optionsToutes.some(v=>v.ticker===depuisUrl)) depart = depuisUrl;
  else if(derniere && optionsToutes.some(v=>v.ticker===derniere)) depart = derniere;
  if(depart){ sel.value = depart; afficher(depart); }
}

// --- Alerte de prix (locale au navigateur : active uniquement page ouverte) ---
function chargerAlertes(){
  try{ return JSON.parse(localStorage.getItem('brvm_alertes')||'{}'); }catch(e){ return {}; }
}
function sauverAlertes(a){ try{ localStorage.setItem('brvm_alertes', JSON.stringify(a)); }catch(e){} }

function rendreAlerte(t, coursActuel){
  const zone = document.getElementById('blocAlerte');
  const alertes = chargerAlertes();
  const a = alertes[t];
  let banniere = '';
  if(a && coursActuel!=null){
    const declenchee = a.sens==='dessus' ? coursActuel >= a.seuil : coursActuel <= a.seuil;
    if(declenchee){
      banniere = `<div class="bandeau-alerte">🔔 Alerte : le cours (${fmtEntier(coursActuel)} FCFA) est
        ${a.sens==='dessus'?'passé au-dessus de':'passé en dessous de'} votre seuil de ${fmtEntier(a.seuil)} FCFA.</div>`;
      if(!a.notifie && window.Notification && Notification.permission==='granted'){

      }

      <select id="alerteSens">

        <option value="dessous" ${a&&a.sens==='dessous'?'selected':''}>en dessous de</option>
      </select>
      <input type="number" id="alerteSeuil" placeholder="Seuil FCFA" value="${a?a.seuil:''}">
      <button type="button" id="btnAlerteValider">${a?'Mettre à jour':'Activer'}</button>
      ${a?'<button type="button" id="btnAlerteSupprimer">Supprimer</button>':''}
    </div>
    <p class="note-limite">Actif seulement pendant que cette page reste ouverte dans votre
      navigateur : aucune alerte ne peut être envoyée en votre absence, cet outil ne
      dispose pas de serveur.</p>`;
  document.getElementById('btnAlerteValider').onclick = ()=>{
    const seuil = parseFloat(document.getElementById('alerteSeuil').value);
    const sens = document.getElementById('alerteSens').value;
    if(!seuil || seuil<=0) return;
    if(window.Notification && Notification.permission==='default'){
      Notification.requestPermission();
    }
    const al = chargerAlertes();
    al[t] = {seuil, sens, notifie:false};

    rendreAlerte(t, coursActuel);
  };
  const btnSup = document.getElementById('btnAlerteSupprimer');

  };
}

function derniersFondamentaux(fo){
  const res={};
  const exs = Object.keys(fo.exercices||{}).sort();
  for(const champ of ["per","bnpa","pbr","roe_pct","dette_sur_cp","capitaux_propres"]){
    for(let i=exs.length-1;i>=0;i--){
      const l=fo.exercices[exs[i]];
      if(l && l[champ] && l[champ].valeur!=null){
        res[champ]=l[champ].valeur;
        if(champ==="roe_pct") res.exercice_roe=exs[i];
        break;
      }
    }
  }
  return res;
}

function seriePourPeriode(){
  if(!histo) return {labels:[],data:[],ref:null,coupure:null};
  const q=histo.quotidien||[], m=histo.mensuel||[];
  const combine=[...m.map(x=>({d:x.date,c:x.cours})),
                 ...q.filter(x=>!m.length||x.date>m[m.length-1].date).map(x=>({d:x.date,c:x.cours}))];
  const dern = combine.length?combine[combine.length-1].d:null;
  const coupe = js => combine.filter(x=>x.d>=js);
  const an=dern?+dern.slice(0,4):0;
  function serie(s,cut){return {labels:s.map(x=>x.d),data:s.map(x=>x.c),
    ref:s.length?s[0].c:null,coupure:cut||null};}
  function rec(d,ans,mois){
    let a=+d.slice(0,4), mo=+d.slice(5,7)-mois; a-=ans;
    while(mo<1){mo+=12;a--;}
    return a+"-"+String(mo).padStart(2,"0")+d.slice(7,10);
  }
  if(!dern) return {labels:[],data:[],ref:null,coupure:null};
  let cut;
  switch(periode){
    case "1J": {
      const pts=(histo.seance&&histo.seance.points)||[];
      return {labels:pts.map(p=>p.h), data:pts.map(p=>p.cours),
              ref:histo.seance?histo.seance.veille:null, coupure:null};
    }
    case "1S": { const s=q.slice(-5);
      return {labels:s.map(x=>x.date),data:s.map(x=>x.cours),
              ref:s.length?s[0].cours:null, coupure:null}; }
    case "1M": cut=rec(dern,0,1); return serie(coupe(cut),cut);
    case "3M": cut=rec(dern,0,3); return serie(coupe(cut),cut);
    case "6M": cut=rec(dern,0,6); return serie(coupe(cut),cut);
    case "YTD": cut=an+"-01-01"; return serie(coupe(cut),cut);
    case "1A": cut=rec(dern,1,0); return serie(coupe(cut),cut);
    default:   return serie(combine,null);
  }
}

function majVariation(){
  const v = valCourante||{};
  const el = document.getElementById('variation');
  const dateEl = document.getElementById('dateCours');
  if(periode==="1J"){
    const va = v.variation_pct;
    const delta = (v.cours!=null && va!=null) ? v.cours - v.cours/(1+va/100) : null;
    el.className = va>0?'hausse':va<0?'baisse':'neutre';
    el.textContent = (delta!=null?((delta>=0?'+':'')+fmtEntier(delta)+' FCFA  '):'') +
                     (va!=null?((va>=0?'↗ +':'↘ ')+fmt(va)+' %'):'');
    const d = cours.maj ? new Date(cours.maj) : null;
    dateEl.textContent = d ? '· ' +
      d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}) : '';
  } else {
    const s = seriePourPeriode();
    if(s.data.length>1){
      const debut=s.data[0], fin=s.data[s.data.length-1];
      const delta=fin-debut, va=debut?((fin/debut-1)*100):null;
      el.className = delta>0?'hausse':delta<0?'baisse':'neutre';
      el.textContent = (delta>=0?'+':'')+fmtEntier(delta)+' FCFA  ' +
                       (va!=null?((va>=0?'↗ +':'↘ ')+fmt(va)+' %'):'');
    } else { el.className='neutre'; el.textContent='—'; }
    // Libelle honnete : si le 1er point disponible est posterieur au debut
    // theorique de la periode (>3 jours), on affiche la date reelle de depart.
    let libelle = LIB_PERIODE[periode]||periode;
    const premier = s.labels.length ? String(s.labels[0]) : null;
    if(s.coupure && premier && premier.length===10){
      const ecartJours = (new Date(premier) - new Date(s.coupure)) / 86400000;
      if(ecartJours > 3){
        libelle = "depuis le " + new Date(premier)
          .toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
      }
    }
    dateEl.textContent = '· ' + libelle;
  }
}

function majPeriodes(){
  const pts=(histo&&histo.seance&&histo.seance.points)||[];

function dessinerGraphique(){
  if(!window.Chart) return;
  const s=seriePourPeriode();
  const m=document.getElementById('msgGraph');
  m.style.display = s.data.length?'none':'flex';
  if(!s.data.length){ m.textContent="Pas encore de données pour cette période"; }
  const monte = s.data.length>1 ? s.data[s.data.length-1]>=s.data[0] : true;
  const coul = monte ? couleurCss('--vert') : couleurCss('--rouge');
  if(graph) graph.destroy();
  const datasets=[{data:s.data,borderColor:coul,borderWidth:2,
      pointRadius:0,fill:true,tension:0,stepped:periode==="1J",
      backgroundColor:c=>{const g=c.chart.ctx.createLinearGradient(0,0,0,230);
        g.addColorStop(0,coul+"33");g.addColorStop(1,coul+"00");return g;}}];
  if(s.ref!=null && s.data.length>1){
    datasets.push({data:s.data.map(()=>s.ref),borderColor:couleurCss('--gris'),
      borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false});
  }
  graph = new Chart(document.getElementById('graphique'),{
    type:'line',
    data:{labels:s.labels,datasets},
    options:{maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{intersect:false,mode:'index',
        filter:i=>i.datasetIndex===0}},
      scales:{x:{ticks:{maxTicksLimit:5,color:couleurCss('--gris'),font:{size:11}},grid:{display:false}},
              y:{position:'right',ticks:{maxTicksLimit:5,color:couleurCss('--gris'),font:{size:11},
                 callback:v=>fmtEntier(v)},grid:{color:couleurCss('--pastel')}}}}
  });
}

let analyse=null;
const COUL={vert:"#0e9f6e",orange:"#d97706",rouge:"#d92d20"};
const TITRES={performances:"Performances",perspectives:"Perspectives",
  remuneration:"Rémunération",valorisation:"Valorisation"};

function jaugeSVG(score, libelleTexte){
  const s = score==null?null:Math.max(0,Math.min(100,score));
  const description = (libelleTexte||"indisponible") + (score!=null?` (${score}/100)`:"");
  const ang = s==null?null:(-90 + s*1.8);
  const gGris=couleurCss('--gris'), gTxt=couleurCss('--txt');
  const arc=(a1,a2,coul)=>{
    const r=70,cx=90,cy=85;
    const p=a=>[cx+r*Math.cos((a-90)*Math.PI/180), cy+r*Math.sin((a-90)*Math.PI/180)];
    const [x1,y1]=p(a1),[x2,y2]=p(a2);
    return `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A70,70 0 0 1 ${x2.toFixed(1)},${y2.toFixed(1)}"
      stroke="${coul}" stroke-width="14" fill="none" stroke-linecap="round"/>`;
  };
  const aiguille = ang==null?"":`
    <line x1="90" y1="85" x2="${(90+52*Math.cos((ang-90)*Math.PI/180)).toFixed(1)}"
      y2="${(85+52*Math.sin((ang-90)*Math.PI/180)).toFixed(1)}"
      stroke="${gTxt}" stroke-width="3" stroke-linecap="round"/>
    <circle cx="90" cy="85" r="5" fill="${gTxt}"/>`;
  return `<svg viewBox="0 0 180 100" role="img" aria-label="${description}"
    style="width:220px;max-width:60%;display:block;margin:0 auto">
    <title>${description}</title>
    ${arc(-90,-46,couleurCss('--rouge'))}${arc(-44,-2,couleurCss('--ambre'))}
    ${arc(0,42,couleurCss('--vert-doux'))}${arc(44,88,couleurCss('--vert'))}
    <text x="22" y="98" font-size="9" fill="${gGris}">Mauvais</text>
    <text x="42" y="18" font-size="9" fill="${gGris}">Mitigé</text>
    <text x="118" y="18" font-size="9" fill="${gGris}">Bon</text>
    <text x="132" y="98" font-size="9" fill="${gGris}">Excellent</text>
    ${aiguille}</svg>`;
}

function rendreAnalyse(t){
  const zone=document.getElementById('contenuAnalyse');
  const a=analyse&&analyse.valeurs&&analyse.valeurs[t];
  if(!a){ zone.innerHTML="<p class='desc'>Analyse non disponible pour cette valeur.</p>"; return; }
  let html="";
  if(a.secteur_repli_marche){
    html+=`<p class="notebas" style="background:var(--pastel);border-radius:8px;padding:8px 10px;
      margin-bottom:14px">ℹ️ Le secteur de cette valeur ne compte que ${a.secteur_taille}
      société(s) — trop peu pour une médiane sectorielle fiable. Les comparaisons ci-dessous
      utilisent la médiane de l'ensemble du marché à la place.</p>`;
  }
  for(const dim of ["performances","perspectives","remuneration","valorisation"]){
    const sc=a.scores[dim], lib=a.libelles[dim];
    const coulLib = sc==null?couleurCss('--gris-clair'):sc<25?COUL.rouge:sc<50?COUL.orange:COUL.vert;
    html+=`<div class="carte"><h2 style="margin-top:0">${TITRES[dim]}</h2>${jaugeSVG(sc, lib)}
      <p style="text-align:center;font-weight:800;color:${coulLib};margin:2px 0 2px">${lib}</p>
      <span class="score-jauge">${sc!=null?sc+"/100":"Donnée indisponible"}</span>`;
    const past=a.pastilles[dim]||[];
    if(past.length){
      html+="<ul class='liste liste-pastilles'>"+past.map(p=>
        `<li style="display:flex;justify-content:flex-start;gap:10px;padding:9px 0;
          border-bottom:1px solid var(--pastel);font-size:14.5px">
          <span aria-hidden="true" style="min-width:9px;height:9px;border-radius:50%;
            background:${COUL[p.coul]};display:inline-block;margin-top:5px;flex-shrink:0"></span>
          <span style="flex:1">${p.txt}</span></li>`).join("")+"</ul>";
    } else {
      html+="<p class='desc' style='color:var(--gris)'>Données insuffisantes pour cette dimension.</p>";
    }
    html+="</div>";
  }
  html+=`<h2 style="text-align:center;text-decoration:underline;font-style:italic;
    font-weight:600;font-size:15px">Analyse du ${analyse.date_analyse}</h2>`;
  const hist = historiqueRecos[t]||[];
  if(hist.length>=2){
    const avantDernier = hist[hist.length-2], dernier = hist[hist.length-1];
    if(avantDernier.reco !== dernier.reco){
      html+=`<p class="desc" style="background:var(--pastel);border-radius:8px;padding:8px 10px;
        margin-bottom:10px">↔ Recommandation modifiée depuis le ${avantDernier.date} :
        <strong>${avantDernier.reco} → ${dernier.reco}</strong>.</p>`;
    }
  }
  html+=a.conclusion.map(p=>`<p class="desc" style="margin-bottom:12px">${p}</p>`).join("");
  if(a.proche_seuil){
    html+=`<p class="desc" style="color:var(--ambre-texte);font-weight:600;margin-bottom:12px;text-align:left">⚠️ Ce verdict
      est proche du seuil de catégorie suivante (à ${fmt(a.marge_categorie)} points sur 100) —
      un score qui pourrait basculer vers une autre recommandation lors d'une prochaine mise à
      jour des données.</p>`;
  }
  html+=`<p class="notebas">Analyse générée automatiquement par règles à partir des données
    collectées — ne constitue pas un conseil en investissement.</p>`;
  zone.innerHTML=html;
}

function cagrJS(vals){
  const v=vals.filter(x=>x!=null);
  if(v.length<3||v[0]<=0||v[v.length-1]<=0) return null;
  return (Math.pow(v[v.length-1]/v[0],1/(v.length-1))-1)*100;
}
function medianeJS(l){const s=l.filter(x=>x!=null).sort((a,b)=>a-b);
  if(!s.length)return null;const n=s.length;
  return n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2;}

let specsFiltres={};
let ecouteurFiltresInstalle=false;

function sparklineSVG(tk){
  const hst=cacheHisto.get(tk);
  if(!hst) return '';
  const m=(hst.mensuel||[]).slice(-12).map(x=>x.cours).filter(v=>v!=null);
  if(m.length<2) return '';
  const w=54,ht=20;
  const min=Math.min(...m), max=Math.max(...m);
  const norm=v=> max===min ? ht/2 : ht-((v-min)/(max-min))*ht;
  const step=w/(m.length-1);
  const pts=m.map((v,i)=>`${(i*step).toFixed(1)},${norm(v).toFixed(1)}`).join(' ');
  const coul = m[m.length-1]>=m[0] ? couleurCss('--vert') : couleurCss('--rouge');
  return `<svg class="spark" width="${w}" height="${ht}" viewBox="0 0 ${w} ${ht}"
    aria-hidden="true" focusable="false"><polyline points="${pts}" fill="none"
    stroke="${coul}" stroke-width="1.6"/></svg>`;
}

function rendreTableDepuisSpec(id){
  const spec=specsFiltres[id];
  if(!spec.donnees.length) return '<p class="vide">Aucune valeur ne satisfait actuellement tous les critères.</p>';
  const entetes=spec.colonnes.map((c,i)=>{
    const triable=!!c[2];
    const fleche= spec.triCol===i ? (spec.triAsc?'▲':'▼') : '';
    return `<th ${triable?`class="triable" data-table="${id}" data-col="${i}" tabindex="0" role="button" aria-label="Trier par ${c[0]}"`:''}>${c[0]}${triable?`<span class="fleche">${fleche}</span>`:''}</th>`;
  }).join('');
  const lignes=spec.donnees.map(x=>`<tr>${spec.colonnes.map(c=>`<td>${c[1](x)}</td>`).join('')}</tr>`).join('');
  return `<div class="barre-outils-table">
      <button type="button" class="bouton-csv" data-csv="${id}">⬇ Exporter en CSV</button>
    </div>
    <table><tr>${entetes}</tr>${lignes}</table>`;
}

function colVar(v){
  if(v==null) return '—';
  return `<span class="${v>=0?'pos':'neg'}">${v>=0?'+':''}${fmt(v)} %</span>`;
}
function construireTableTriable(id, donnees, colonnes){
  specsFiltres[id]={donnees, colonnes, triCol:null, triAsc:false};
  return `<div id="conteneur-${id}">${rendreTableDepuisSpec(id)}</div>`;
}

function trierTable(id, col){
  const spec=specsFiltres[id];
  const accesseur=spec.colonnes[col][2];
  if(!accesseur) return;
  if(spec.triCol===col) spec.triAsc=!spec.triAsc; else { spec.triCol=col; spec.triAsc=false; }
  spec.donnees.sort((a,b)=>{
    const va=accesseur(a), vb=accesseur(b);
    if(va==null && vb==null) return 0;
    if(va==null) return 1; if(vb==null) return -1;
    return spec.triAsc ? (va-vb) : (vb-va);
  });
  const conteneur=document.getElementById('conteneur-'+id);
  if(conteneur) conteneur.innerHTML = rendreTableDepuisSpec(id);
}

function exporterCSV(id){
  const spec=specsFiltres[id];
  if(!spec || !spec.donnees.length) return;
  const echapper=v=>`"${String(v).replace(/"/g,'""')}"`;
  const lignes=[spec.colonnes.map(c=>echapper(c[0])).join(',')];
  for(const x of spec.donnees){
    lignes.push(spec.colonnes.map(c=>{
      if(c[2]){ const v=c[2](x); return echapper(v==null?'':v); }
      const tmp=document.createElement('div'); tmp.innerHTML=c[1](x);
      return echapper((tmp.textContent||'').replace(/\s+/g,' ').trim());
    }).join(','));
  }
  const blob=new Blob(['\ufeff'+lignes.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=id+'_brvm.csv';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

const RANG_RECO={Acheter:2,Conserver:1,Vendre:0};

async function rendreFiltres(){
  const zone=document.getElementById('contenuFiltres');
  const tousTickers=(cours.valeurs||[]).map(v=>v.ticker);
  const manquants=tousTickers.filter(tk=>!cacheHisto.has(tk));
  if(manquants.length){
    zone.innerHTML='<p class="desc" style="color:var(--gris)">Chargement des historiques '+
      'pour les mini-graphiques…</p>';
    await Promise.all(manquants.map(async tk=>{
      const d=await fetch('data/historique/'+tk+'.json').then(r=>r.json()).catch(()=>null);
      cacheHisto.set(tk, d);
    }));
  }

  const badge=r=>r?`<span class="badge b${r[0]}">${r}</span>`:"";
  const V=[];
  for(const v of (cours.valeurs||[])){
    const tk=v.ticker, te=tech[tk]||{}, fo=fonda[tk]||{};
    const exs=Object.keys(fo.exercices||{}).sort();
    const serie=ch=>exs.map(e=>fo.exercices[e][ch]?fo.exercices[e][ch].valeur:null);
    const dern=ch=>{for(let i=exs.length-1;i>=0;i--){
      const x=fo.exercices[exs[i]][ch]; if(x&&x.valeur!=null) return x.valeur;} return null;};
    const o={tk, nom:v.nom, cours:v.cours,
      cCA:cagrJS(serie("ca")), cRN:cagrJS(serie("rn")), cBPA:cagrJS(serie("bnpa")),
      tend:te.tendance_provisoire_mensuelle, var1m:te.var_1m,
      mm20:te.mm20, mm50:te.mm50, mm200:te.mm200,
      pbr:dern("pbr"), bnpa:dern("bnpa"),
      div:(()=>{for(let i=exs.length-1;i>=Math.max(0,exs.length-2);i--){
        const x=fo.exercices[exs[i]].dividende;
        if(x&&x.valeur!=null) return x.valeur;} return null;})(),
      reco:((analyse&&analyse.valeurs[tk])||{}).reco, sect:secteurs[tk]};
    o.dyNet=(o.div&&v.cours)?o.div*0.9/v.cours*100:null;
    o.dyBrut=(o.div&&v.cours)?o.div/v.cours*100:null;
    o.exc=(o.div&&o.bnpa&&o.bnpa>0)?(o.div/o.bnpa*100>150):false;
    V.push(o);
  }
  const lien=x=>`<span class="tick" tabindex="0" role="button"
    onclick="ouvrirFiche('${x.tk}')" onkeydown="if(event.key==='Enter')ouvrirFiche('${x.tk}')"
    >${sparklineSVG(x.tk)} ${x.tk}</span>
    <span style="color:var(--gris);font-size:11px">${(x.nom||"").slice(0,20)}</span>`;

  let html=`<div class="carte"><h2 style="margin-top:0">Segment Croissance
    (cible : 80 % du portefeuille)</h2>
    <p class="regle">CA, résultat net et BPA en croissance sur les exercices disponibles,
    et tendance de cours haussière. Cliquez sur un en-tête pour trier.</p>`;
  const cr=V.filter(x=>x.cCA>0&&x.cRN>0&&x.cBPA>0&&x.tend==="haussiere")
    .sort((a,b)=>b.cRN-a.cRN);
  html+=construireTableTriable('croissance', cr, [
    ["Valeur",lien,null],["Cours",x=>fmtEntier(x.cours),x=>x.cours],
    ["CA %/an",x=>colVar(x.cCA),x=>x.cCA],["RN %/an",x=>colVar(x.cRN),x=>x.cRN],
    ["BPA %/an",x=>colVar(x.cBPA),x=>x.cBPA],
    ["Avis",x=>badge(x.reco),x=>RANG_RECO[x.reco]??-1]]);
  html+="</div>";

  html+=`<div class="carte"><h2 style="margin-top:0">Segment Rendement
    (cible : 20 % du portefeuille)</h2>
    <p class="regle">Tri par rendement du dividende net d'IRVM (10 %) au cours actuel.</p>`;
  const rd=V.filter(x=>x.dyNet!=null).sort((a,b)=>b.dyNet-a.dyNet).slice(0,12);
  html+=construireTableTriable('rendement', rd, [
    ["Valeur",lien,null],["Cours",x=>fmtEntier(x.cours),x=>x.cours],
    ["DY net %",x=>fmt(x.dyNet)+(x.exc?" ⚠":""),x=>x.dyNet],
    ["DY brut %",x=>fmt(x.dyBrut),x=>x.dyBrut],
    ["Avis",x=>badge(x.reco),x=>RANG_RECO[x.reco]??-1]]);
  if(rd.some(x=>x.exc)) html+=`<p class="regle">⚠ Dividende exceptionnel
    (supérieur à 150 % du bénéfice) — rendement vraisemblablement non récurrent.
    Voir l'onglet Analyse de la valeur pour le détail.</p>`;
  html+="</div>";

  const mmDispo=V.some(x=>x.mm20!=null&&x.mm50!=null);
  html+=`<div class="carte"><h2 style="margin-top:0">Momentum
    — décotées en début de cycle haussier</h2>
    <p class="regle">${mmDispo
      ? "MM20 &gt; MM50, cours &gt; MM200, et PBR sous la médiane de son secteur."
      : "Règle provisoire (historique quotidien en cours d'accumulation) : tendance 12 mois "
        + "haussière, variation 1 mois positive, et PBR sous la médiane de son secteur. "
        + "Le croisement MM20/MM50 prendra le relais automatiquement dès que possible."}</p>`;
  const medPbrSect={};
  for(const s of new Set(V.map(x=>x.sect).filter(Boolean)))
    medPbrSect[s]=medianeJS(V.filter(x=>x.sect===s).map(x=>x.pbr));
  const decote=x=>x.pbr!=null&&medPbrSect[x.sect]!=null&&x.pbr<=medPbrSect[x.sect];
  const mo=V.filter(x=> decote(x) && (mmDispo
      ? (x.mm20!=null&&x.mm50!=null&&x.mm20>x.mm50&&(x.mm200==null||x.cours>x.mm200))
      : (x.tend==="haussiere"&&x.var1m>0)))
    .sort((a,b)=>(b.var1m||0)-(a.var1m||0));
  html+=construireTableTriable('momentum', mo, [
    ["Valeur",lien,null],["Cours",x=>fmtEntier(x.cours),x=>x.cours],
    ["Var. 1 mois %",x=>colVar(x.var1m),x=>x.var1m],["PBR",x=>fmt(x.pbr),x=>x.pbr],
    ["PBR méd. sect.",x=>fmt(medPbrSect[x.sect]),null],
    ["Avis",x=>badge(x.reco),x=>RANG_RECO[x.reco]??-1]]);
  html+="</div>";

  html+=`<p class="notebas">Sélections générées automatiquement par règles — ne constituent
    pas un conseil en investissement. Une valeur peut appartenir à plusieurs segments.</p>`;

  html+=`<div class="carte"><h2 style="margin-top:0">Comparateur</h2>
    <p class="regle">Sélectionnez 2 ou 3 valeurs (Ctrl/Cmd + clic pour une sélection multiple),
    puis comparez leurs indicateurs clés côte à côte.</p>
    <div class="comparateur">
      <select id="comparateurSelect" multiple aria-label="Choisir les valeurs à comparer">
        ${V.slice().sort((a,b)=>a.nom.localeCompare(b.nom))
          .map(x=>`<option value="${x.tk}">${x.nom} (${x.tk})</option>`).join('')}
      </select>
      <div class="barre-outils-table" style="justify-content:flex-start;margin-top:8px">
        <button type="button" class="bouton-csv" id="btnComparer">Comparer</button>
      </div>
      <div id="resultatComparateur"></div>
    </div></div>`;

  zone.innerHTML=html;

  document.getElementById('btnComparer').onclick=()=>{
    const sel=document.getElementById('comparateurSelect');
    const choisis=Array.from(sel.selectedOptions).map(o=>o.value).slice(0,3);
    const zoneRes=document.getElementById('resultatComparateur');
    if(choisis.length<2){
      zoneRes.innerHTML='<p class="desc" style="color:var(--gris)">Choisissez au moins deux valeurs (3 maximum).</p>';
      return;
    }
    const ligne=(lib,f)=>`<tr><td>${lib}</td>${choisis.map(tk=>`<td>${f(tk)}</td>`).join('')}</tr>`;
    let t=`<table><tr><th></th>${choisis.map(tk=>`<th>${tk}</th>`).join('')}</tr>`;
    t+=ligne('Cours', tk=>fmtEntier((V.find(x=>x.tk===tk)||{}).cours));
    t+=ligne('Secteur', tk=>LIB_SECTEURS[secteurs[tk]]||secteurs[tk]||'—');
    t+=ligne('PER', tk=>{const d=derniersFondamentaux(fonda[tk]||{}); return d.per!=null?fmt(d.per)+'x':'—';});
    t+=ligne('ROE', tk=>{const d=derniersFondamentaux(fonda[tk]||{}); return d.roe_pct!=null?fmt(d.roe_pct)+' %':'—';});
    t+=ligne('DY net %', tk=>{const o=V.find(x=>x.tk===tk); return o&&o.dyNet!=null?fmt(o.dyNet):'—';});
    t+=ligne('Score moyen', tk=>{
      const sc=Object.values(((analyse&&analyse.valeurs[tk])||{}).scores||{}).filter(v=>v!=null);
      return sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length)+'/100':'—';
    });
    t+=ligne('Avis', tk=>badge(((analyse&&analyse.valeurs[tk])||{}).reco));
    t+='</table>';
    zoneRes.innerHTML=t;
  };

  if(!ecouteurFiltresInstalle){
    zone.addEventListener('click', e=>{
      const th=e.target.closest('th.triable');
      if(th){ trierTable(th.dataset.table, +th.dataset.col); return; }
      const btn=e.target.closest('.bouton-csv[data-csv]');
      if(btn){ exporterCSV(btn.dataset.csv); return; }
    });
    zone.addEventListener('keydown', e=>{
      if(e.key!=='Enter') return;
      const th=e.target.closest('th.triable');
      if(th){ trierTable(th.dataset.table, +th.dataset.col); }
    });
    ecouteurFiltresInstalle=true;
  }
}

function rendreCarnet(t){
  const zone=document.getElementById('contenuCarnet');
  const v=(cours.valeurs||[]).find(x=>x.ticker===t)||{};
  const se=(histo&&histo.seance)||{};
  const pts=se.points||[];
  let html="";

  // Echanges de la seance, heure par heure (volume incremental entre releves)
  html+=`<div class="carte"><h2 style="margin-top:0">Échanges de la séance${se.date?` — ${se.date}`:""}</h2>`;
  if(pts.length){
    let prec=0;
    const lignes=pts.map(p=>{
      const dv=Math.max(0,(p.volume||0)-prec); prec=p.volume||0;
      return `<div><dt>${p.h}</dt>
        <dd>${fmtEntier(p.cours)} FCFA · ${fmtEntier(dv)} titres</dd></div>`;
    }).join("");
    html+=`<dl class="liste">${lignes}</dl>`;
  } else {
    html+=`<p class="desc" style="color:var(--gris)">Aucun relevé pour la dernière séance.</p>`;
  }
  html+="</div>";

  // Liquidite
  const te=tech[t]||{};
  const valJour=(v.cours!=null&&v.volume!=null)?v.cours*v.volume:null;
  const valMoy=(v.cours!=null&&te.volume_moyen_20!=null)?v.cours*te.volume_moyen_20:null;
  // Rang de liquidite sur le marche (valeur moyenne echangee)
  const classement=Object.entries(tech)
    .map(([tk,x])=>{const cv=(cours.valeurs||[]).find(y=>y.ticker===tk);
      return [tk,(cv&&cv.cours!=null&&x.volume_moyen_20!=null)?cv.cours*x.volume_moyen_20:null];})
    .filter(x=>x[1]!=null).sort((a,b)=>b[1]-a[1]);
  const rang=classement.findIndex(x=>x[0]===t);
  html+=`<div class="carte"><h2 style="margin-top:0">Liquidité</h2><dl class="liste">
    <div><dt>Volume de la séance</dt><dd>${fmtEntier(v.volume)} titres</dd></div>
    <div><dt>Valeur échangée (séance)</dt><dd>${valJour!=null?fmtMds(valJour/1e6):"—"}</dd></div>
    <div><dt>Valeur moyenne échangée (20 séances)</dt><dd>${valMoy!=null?fmtMds(valMoy/1e6):"—"}</dd></div>
    <div><dt>Rang de liquidité sur le marché</dt><dd>${rang>=0?(rang+1)+" / "+classement.length:"—"}</dd></div>
  </dl></div>`;

  html+=`<p class="notebas">Le carnet d'ordres multi-niveaux (bid/ask) n'est pas diffusé
    gratuitement par la BRVM ; cet onglet présente les échanges réels de la séance et des
    indicateurs de liquidité calculés à partir des données officielles.</p>`;
  zone.innerHTML=html;
}

(async()=>{ analyse = await fetch('data/analyse.json').then(r=>r.json()).catch(()=>null); })();
chargerBase();
</script>
